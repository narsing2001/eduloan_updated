server:
  port: 8080

spring:
  application:
    name: api-gateway


  main:
    web-application-type: reactive

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true


      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"   # React frontend API call allowed for this port
              - "http://localhost:4200"   # Angular frontend A{PI call allowed for this port
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true


      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        - id: auth-route
          uri: lb://educationloan
          predicates:
            - Path=/api/v1/auth/**

        - id: user-route
          uri: lb://educationloan
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthFilter

        - id: roles-route
          uri: lb://educationloan
          predicates:
            - Path=/api/v1/roles/**
          filters:
            - AuthFilter

        - id: user-roles-route
          uri: lb://educationloan
          predicates:
            - Path=/api/v1/user-roles/**
          filters:
            - AuthFilter

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: 7A25432A462D4A614E645267556B58703273357638792F423F4528482B4D6251


management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always

#
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO