server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  servlet:
    context-path: /

spring:
  application:
    name: LoanTypeStrategyInterest

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

logging:
  level:
    root: INFO
    com.example.LoanTypeStrategyInterest: DEBUG
    org.springdoc: INFO
    org.springframework.web: DEBUG   # <-- added from test config
    org.springframework.test: DEBUG  # <-- added from test config
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

    management:
      endpoints:
        web:
          exposure:
            include: "*"
      endpoint:
        health:
          show-details: always


  logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE
      org.springframework.web: ERROR
      org.springframework.test: ERROR

# Test-specific properties
  app:
    test:
      mode: true   # <-- added from test config

# Mock configurations
  mock:
    interest:
      calculation:
        enabled: true   # <-- added from test config
  external:
    services:
      enabled: true   # <-- added from test config

#  health	       /actuator/health	               Shows application health (DB, disk, custom indicators).
#info	           /actuator/info	               Displays app info (from application.yml or build metadata).
#metrics	       /actuator/metrics	           Exposes metrics (memory, CPU, JVM, HTTP requests).
#env	           /actuator/env	               Shows environment properties (system, config).
#beans	           /actuator/beans	               Lists all Spring beans in the context.
#conditions	       /actuator/conditions	           Shows auto‑configuration conditions.
#configprops	   /actuator/configprops	       Displays configuration properties.
#loggers	       /actuator/loggers	           Allows viewing/changing log levels at runtime.
#threaddump	       /actuator/threaddump	           Provides JVM thread dump.
#heapdump	       /actuator/heapdump	           Downloads a heap dump.
#shutdown	       /actuator/shutdown	           Gracefully shuts down the app (must be enabled explicitly).
#auditevents	   /actuator/auditevents	       Shows audit events.
#caches	           /actuator/caches	               Displays cache statistics.
#scheduledtasks	   /actuator/scheduledtasks	       Lists scheduled tasks.
#httptrace	      /actuator/httptrace	           Shows last HTTP request traces (needs HttpTraceRepository).


# swagger/openapi configuration-------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
    syntaxHighlight:
      activated: true
      theme: monokai
    defaultModelsExpandDepth: 1
    defaultModelExpandDepth: 1
    showExtensions: true
    showCommonExtensions: true
  show-actuator: true
  use-management-port: false
  cache:
    disabled: false
    group-configs:
          - group: actuator
            paths-to-match: /actuator/**
          - group: api
            paths-to-match: /api/**






